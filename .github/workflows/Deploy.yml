name: Deploy to App Store

# This workflow triggers every time you push to the 'master' branch.
on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    # We use macos-15 to ensure access to the latest Xcode 26.0.1 environment.
    runs-on: macos-15
    timeout-minutes: 30 # Prevents the runner from hanging and wasting CI minutes.

    steps:
      - name: Checkout repository
        # Downloads your source code to the GitHub runner.
        uses: actions/checkout@v4

      - name: Select Xcode
        # Forces the system to use Xcode 26.0.1 to match your local development environment.
        run: sudo xcode-select -switch /Applications/Xcode_26.0.1.app

      - name: Setup App Store Connect API Key
        # Xcode requires the .p8 key to be stored in a specific, absolute path.
        # We create the standard directory and write the secret key to a file.
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_P8_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      - name: Set Build Number
        # 'agvtool' updates the CFBundleVersion (build number) in all targets.
        # We use the GitHub Run Number to ensure every upload has a unique ID, preventing Apple rejections.
        run: |
          xcrun agvtool new-version -all ${{ github.run_number }}

      - name: Archive App
        # STEP 1: Compilation. This creates the .xcarchive (the "master mold" of the app).
        # -allowProvisioningUpdates: Allows Xcode to download profiles from Apple using the API Key.
        run: |
          xcodebuild clean archive \
            -workspace EssentialWorkspace.xcworkspace \
            -scheme "EssentialApp" \
            -configuration "Release" \
            -sdk iphoneos \
            -archivePath "DerivedData/Archive/EssentialApp.xcarchive" \
            -allowProvision